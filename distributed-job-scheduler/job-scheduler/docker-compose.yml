version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobscheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/jobscheduler
      SECRET_KEY: change-this-in-production
    ports:
      - "8000:8000"

  scheduler:
    build: ./backend
    command: ["python", "-m", "app.services.scheduler"]
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/jobscheduler
      SECRET_KEY: change-this-in-production

  worker-1:
    build: ./worker
    depends_on:
      - backend
    command: ["--api-base", "http://backend:8000", "--queues", "default,emails,reports", "--concurrency", "5"]

  worker-2:
    build: ./worker
    depends_on:
      - backend
    command: ["--api-base", "http://backend:8000", "--queues", "default,emails,reports", "--concurrency", "5"]

  frontend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: ["python", "-m", "http.server", "8080"]
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  pgdata:
